name: Pro Cloud Sinyal Tarama

on:
  schedule:
    - cron: '*/5 * * * *'   # Her 5 dakikada bir (UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod: normal veya test-telegram'
        required: false
        default: 'normal'

jobs:
  tara:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Kodu al
        uses: actions/checkout@v4.2.2

      - name: Node.js kur
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: State dosyasını geri yükle
        uses: actions/cache@v4.2.3
        with:
          path: data/cloud_state.json
          key: sinyal-state-${{ github.run_number }}
          restore-keys: |
            sinyal-state-

      - name: Sinyal tara
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test-telegram" ]; then
            node scripts/cloud_sinyal.mjs --test-telegram
          else
            node scripts/cloud_sinyal.mjs
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
