name: ProPicks AI Hisse İstihbarat

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Haftaiçi 07:00 UTC = 10:00 İstanbul
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod: normal | dry | test-telegram'
        required: false
        default: 'normal'

jobs:
  tara:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları yükle
        run: npm ci --omit=dev

      - name: Playwright tarayıcı yükle
        if: ${{ github.event.inputs.mode != 'test-telegram' }}
        run: npx playwright install chromium --with-deps

      - name: Önceki state'i geri yükle
        if: ${{ github.event.inputs.mode != 'test-telegram' }}
        uses: actions/cache@v4
        with:
          path: |
            data/propicks_state.json
            data/propicks_prev.json
          key: propicks-state-${{ github.run_number }}
          restore-keys: |
            propicks-state-

      - name: ProPicks tara
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "dry" ]; then
            node scripts/propicks_cloud.mjs --dry
          elif [ "$MODE" = "test-telegram" ]; then
            node scripts/propicks_cloud.mjs --test-telegram
          else
            node scripts/propicks_cloud.mjs
          fi
        env:
          INVESTING_COOKIES:  ${{ secrets.INVESTING_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
