name: ProPicks AI Hisse İstihbarat

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod: normal | dry | session-check | test-telegram'
        required: false
        default: 'normal'

jobs:
  tara:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build tools (better-sqlite3 için)
        if: ${{ github.event.inputs.mode != 'test-telegram' && github.event.inputs.mode != 'session-check' }}
        run: sudo apt-get install -y python3 make g++

      - name: Bağımlılıkları yükle
        run: npm ci --omit=dev

      - name: Playwright tarayıcı yükle
        if: ${{ github.event.inputs.mode != 'test-telegram' }}
        run: npx playwright install chromium --with-deps

      - name: Önceki state'i geri yükle
        if: ${{ github.event.inputs.mode != 'test-telegram' && github.event.inputs.mode != 'session-check' }}
        uses: actions/cache@v4
        with:
          path: data/propicks.db
          key: propicks-db-${{ github.run_number }}
          restore-keys: |
            propicks-db-

      - name: ProPicks çalıştır
        run: |
          MODE="${{ github.event.inputs.mode }}"
          [ -z "$MODE" ] && MODE="normal"
          node scripts/propicks_run.mjs --mode=$MODE
        env:
          INVESTING_COOKIES:  ${{ secrets.INVESTING_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Ekran görüntülerini artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propicks-screens-${{ github.run_number }}
          path: data/screens/
          if-no-files-found: ignore
          retention-days: 7
